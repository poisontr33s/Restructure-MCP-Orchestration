# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: "Be concise and security-focused. Flag prompt injection risks in GitHub Actions workflows."
early_access: false
enable_free_tier: true
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/*.lock"
    - "!**/target/**"
    - "!**/.venv/**"
    - "!**/node_modules/**"
chat:
  auto_reply: true
