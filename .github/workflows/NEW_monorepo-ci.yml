# 🏴‍☠️ Cpt. Guthilda's Essential Monorepo CI
# "A proper TypeScript/pnpm/turbo workflow for the MCP Orchestration System"

name: 🏗️ Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changes.outputs.packages }}
      core: ${{ steps.changes.outputs.core }}
      cli: ${{ steps.changes.outputs.cli }}
      monitor: ${{ steps.changes.outputs.monitor }}
      guthilda: ${{ steps.changes.outputs.guthilda }}
      servers: ${{ steps.changes.outputs.servers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            packages:
              - 'packages/**'
            core:
              - 'packages/core/**'
            cli:
              - 'packages/cli/**'
            monitor:
              - 'packages/monitor/**'
            guthilda:
              - 'packages/guthilda/**'
            servers:
              - 'packages/servers/**'

  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
          
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}

  lint:
    name: 🧹 Lint & Format Check
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Run linting
        run: pnpm lint
        
      - name: Check formatting
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,md,json}"

  typecheck:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Type check
        run: pnpm exec turbo run typecheck

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Build packages
        run: pnpm build
        
      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/build
          key: ${{ runner.os }}-build-${{ github.sha }}

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [install, changes, build]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Restore build outputs
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/build
          key: ${{ runner.os }}-build-${{ github.sha }}
          fail-on-cache-miss: true
          
      - name: Run tests
        run: pnpm test

  integration:
    name: 🔗 Integration Test
    runs-on: ubuntu-latest
    needs: [install, changes, build]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Restore build outputs
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/build
          key: ${{ runner.os }}-build-${{ github.sha }}
          fail-on-cache-miss: true
          
      - name: Start MCP System
        run: pnpm start &
        
      - name: Wait for system startup
        run: sleep 10
        
      - name: Test Guthilda orchestration
        run: pnpm guthilda:status
        
      - name: Test CLI commands
        run: pnpm exec mcp status

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm
        
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-nodemodules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true
          
      - name: Run security audit
        run: pnpm audit --audit-level moderate

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, test, integration, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "🏴‍☠️ Cpt. Guthilda's CI Summary 🏴‍☠️"
          echo "Lint: ${{ needs.lint.result }}"
          echo "TypeCheck: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Integration: ${{ needs.integration.result }}"
          echo "Security: ${{ needs.security.result }}"
          
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Some jobs failed! The ship needs repairs!"
            exit 1
          else
            echo "✅ All systems operational! Ship is seaworthy!"
          fi
